<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Deneme | Kurumsal Arşiv</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #1a1a1a; overflow-x: hidden; text-align: center; }
        
        /* KIRMIZI KAYAN YAZI */
        .marquee-box { background: #ffffff; border-bottom: 1px solid #f0f0f0; padding: 12px 0; overflow: hidden; }
        .marquee-content { color: #ff0000; font-weight: 800; font-size: 16px; white-space: nowrap; display: inline-block; animation: marquee-anim 20s linear infinite; text-transform: uppercase; }
        @keyframes marquee-anim { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* HEADER */
        .header { padding: 80px 20px 40px; }
        .header h1 { font-size: 65px; font-weight: 900; margin: 0; letter-spacing: -4px; color: #000; }
        .header p { font-size: 20px; color: #888; margin-top: 5px; }

        /* BUTON ALANI */
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .action-button { 
            display: block; 
            background: #ffffff; 
            color: #0052cc; 
            text-decoration: none; 
            padding: 25px; 
            border: 2px solid #0052cc; 
            border-radius: 15px; 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0, 82, 204, 0.05);
        }
        .action-button:hover { background: #0052cc; color: #ffffff; transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 82, 204, 0.2); }

        .refresh-note { color: #ff0000; font-weight: bold; font-size: 14px; margin-top: 30px; display: block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .footer { margin-top: 80px; padding: 40px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div class="marquee-box">
        <div class="marquee-content">
            LGS HAZIRLIK SÜRECİNDE YENİ NESİL ASİSTANINIZ Hİ-DENEME YAYINDA! • KURUMSAL DENEME ARŞİVİ GÜNCEL OLARAK YÜKLENİYOR...
        </div>
    </div>

    <div class="header">
        <h1>Hİ-DENEME</h1>
        <p>Kurumsal Deneme Portalı</p>
    </div>

    <div class="container">
        <!-- LGS KURUMSAL DENEMELER BUTONU (LINK EKLENDI) -->
        <a href=https://drive.google.com/drive/folders/1HRgSyRNvjh9NboeIwDkrZSPlxer6K_iR?usp=drive_link
        <span class="refresh-note">⚠️ Güncel Denemeler İçin Sayfayı Yenileyiniz!</span>
    </div>

    <div class="footer">
        © 2026 Hi-Deneme Arşiv • Eğitimde Yeni Standart
    </div>

</body>
</html>
